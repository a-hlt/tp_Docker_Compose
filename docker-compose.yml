version: '3.8'

services:
  # -------------------------------------------------------------
  # Database Service (PostgreSQL)
  # -------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: ynov-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ynov_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ynov_secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-ynov_tasks_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ynov_user} -d $${POSTGRES_DB:-ynov_tasks_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------------
  # Backend Service (NodeJS/Express API)
  # -------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ynov-backend
    environment:
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-ynov_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ynov_secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-ynov_tasks_db}
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # -------------------------------------------------------------
  # Frontend Service (React SPA served by Nginx)
  # -------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ynov-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

# -------------------------------------------------------------
# Data Volumes
# -------------------------------------------------------------
volumes:
  postgres_data:
    driver: local

# -------------------------------------------------------------
# Networks
# -------------------------------------------------------------
networks:
  app-network:
    driver: bridge
